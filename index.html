    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            color: white;
            transition: opacity 0.8s ease;
        }

        .spinner {
            width: 70px;
            height: 70px;
            border: 6px solid rgba(255, 255, 255, 0.3);
            border-top: 6px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #loader h1 {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        #loader p {
            font-size: 15px;
            opacity: 0.9;
            text-align: center;
        }

        #content {
            display: none;
            min-height: 100vh;
        }
    </style>
